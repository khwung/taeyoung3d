<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTACT</title>
  <link rel="stylesheet" href="style.css">

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

<main class="contact-wrap">

  <img src="images/home/CONTACT.png" alt="견적문의" class="contact-base">

  <!-- 상단 메뉴 -->
  <a href="index.html" class="contact-hotspot c-home"></a>
  <a href="portfolio.html" class="contact-hotspot c-portfolio"></a>
  <a href="process.html" class="contact-hotspot c-process"></a>
  <a href="contact.html" class="contact-hotspot c-contact"></a>

  <!-- 실제 입력 폼 -->
  <form class="contact-form" id="contactForm">

    <input type="text" name="name" class="form-name" placeholder="이름을 입력해주세요." required>
    <input type="text" name="phone" class="form-phone" placeholder="예) 010-1234-5678" required>
    <input type="email" name="email" class="form-email" placeholder="이메일을 입력해주세요." required>

    <select name="category" class="form-category" required>
      <option value="" selected disabled>선택해주세요.</option>
      <option>시제품 제작</option>
      <option>건축모형 제작</option>
      <option>발명품 제작</option>
      <option>졸업작품 제작</option>
      <option>화장품 용기</option>
      <option>FDM/SLA 출력</option>
      <option>기타 문의</option>
    </select>

    <select name="budget" class="form-budget">
      <option value="" selected disabled>선택해주세요.</option>
      <option>10만원 이하</option>
      <option>10만원 ~ 30만원</option>
      <option>30만원 ~ 50만원</option>
      <option>50만원 ~ 100만원</option>
      <option>100만원 이상</option>
    </select>

    <textarea name="message" class="form-detail" maxlength="1000" placeholder="프로젝트에 대한 내용을 자세히 입력해주세요." required></textarea>

    <div class="form-file file-guide">
      <span class="file-main">도면·이미지·STL·ZIP 등의 모든 파일은 이메일로 직접 보내주세요.</span>
      <span class="file-sub">문의 접수 후 아래 메일로 첨부파일을 보내주시면 확인 후 연락드립니다.</span>
      <span class="file-mail">ty190225@gmail.com</span>
    </div>

  <button type="submit" class="form-submit">견적 문의 보내기</button>

<a href="https://open.kakao.com/o/sYUVISCb"
   target="_blank"
   class="kakao-link"></a>
   
</form>

</main>

<script>
  emailjs.init({
    publicKey: "pjwKWulAteuo11npm"
  });

  const form = document.getElementById('contactForm');
  const submitBtn = document.querySelector('.form-submit');

  form.addEventListener('submit', function (e) {
    e.preventDefault();

    submitBtn.disabled = true;
    submitBtn.textContent = '전송 중...';

    const params = {
      name: document.querySelector('.form-name').value,
      phone: document.querySelector('.form-phone').value,
      email: document.querySelector('.form-email').value,
      category: document.querySelector('.form-category').value,
      budget: document.querySelector('.form-budget').value,
      message: document.querySelector('.form-detail').value
    };

    emailjs.send('ty190225', 'template_95xtibs', params)
      .then(function () {
        alert('견적 문의가 정상적으로 접수되었습니다.');
        form.reset();
        submitBtn.disabled = false;
        submitBtn.textContent = '견적 문의 보내기';
      })
      .catch(function (error) {
        console.error('EmailJS Error:', error);
        alert('전송 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
        submitBtn.disabled = false;
        submitBtn.textContent = '견적 문의 보내기';
      });
  });

</script>

</body>
</html>
