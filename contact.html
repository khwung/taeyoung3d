<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTACT</title>
  <link rel="stylesheet" href="style.css">

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

<main class="contact-wrap">

  <img src="images/home/CONTACT.png" alt="견적문의" class="contact-base">

  <!-- 상단 메뉴 -->
  <a href="index.html" class="contact-hotspot c-home"></a>
  <a href="portfolio.html" class="contact-hotspot c-portfolio"></a>
  <a href="process.html" class="contact-hotspot c-process"></a>
  <a href="contact.html" class="contact-hotspot c-contact"></a>

  <!-- 실제 입력 폼 -->
  <form class="contact-form" id="contactForm">

    <input type="text" name="name" class="form-name" placeholder="이름을 입력해주세요." required>
    <input type="text" name="phone" class="form-phone" placeholder="예) 010-1234-5678" required>
    <input type="email" name="email" class="form-email" placeholder="이메일을 입력해주세요." required>

    <select name="category" class="form-category" required>
      <option value="" selected disabled>선택해주세요.</option>
      <option>시제품 제작</option>
      <option>건축모형 제작</option>
      <option>발명품 제작</option>
      <option>졸업작품 제작</option>
      <option>화장품 용기</option>
      <option>FDM/SLA 출력</option>
      <option>기타 문의</option>
    </select>

    <select name="budget" class="form-budget">
      <option value="" selected disabled>선택해주세요.</option>
      <option>10만원 이하</option>
      <option>10만원 ~ 50만원</option>
      <option>50만원 ~ 100만원</option>
      <option>100만원 ~ 300만원</option>
      <option>300만원 ~ 500만원</option>
      <option>500만원 ~ 1000만원</option>
      <option>1000만원 이상</option>
    </select>

    <textarea name="message" class="form-detail" maxlength="1000" placeholder="프로젝트에 대한 내용을 자세히 입력해주세요." required></textarea>

    <div class="form-file file-guide" id="dropZone">
      <input type="file" id="fileInput" class="real-file-input" multiple>
      <span class="file-main">도면·이미지·STL·STEP·ZIP 파일을 여기에 드래그하거나 클릭해서 업로드하세요.</span>
      <span class="file-sub" id="fileStatus">파일 선택 전</span>
      
      <span class="file-mail">
첨부파일은 총 4MB 이하만 업로드 가능합니다.<br>
또는 ty190225@gmail.com으로 직접 파일을 보내주세요.
</span>


    </div>

    <button type="submit" class="form-submit">견적 문의 보내기</button>

    <a href="https://open.kakao.com/o/sYUVISCb"
       target="_blank"
       class="kakao-link"></a>

  </form>

</main>
<script>
emailjs.init({
  publicKey: "pjwKWulAteuo11npm"
});

const form = document.getElementById('contactForm');
const submitBtn = document.querySelector('.form-submit');
const fileInput = document.getElementById('fileInput');
const dropZone = document.getElementById('dropZone');
const fileStatus = document.getElementById('fileStatus');

let uploadedFiles = [];
let isUploading = false;

function getKoreaTimeString() {
  return new Intl.DateTimeFormat('ko-KR', {
    timeZone: 'Asia/Seoul',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false
  }).format(new Date());
}

function setUploadLocked(locked) {
  isUploading = locked;
  submitBtn.disabled = locked;
  submitBtn.classList.toggle('is-disabled', locked);
}

function getUploadedFileNames() {
  if (uploadedFiles.length === 0) return '첨부파일 없음';
  return uploadedFiles.map(file => file.name).join(', ');
}

function getUploadedFileLinks() {
  if (uploadedFiles.length === 0) return '첨부파일 없음';
  return uploadedFiles.map(file => `${file.name}: ${file.link}`).join('\n');
}

function resetUploadState() {
  uploadedFiles = [];
  fileInput.value = '';
  fileStatus.textContent = '파일 선택 전';
  fileStatus.classList.remove('upload-success', 'upload-error');
}

dropZone.addEventListener('click', () => {
  if (isUploading) return;
  fileInput.click();
});

dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  if (isUploading) return;
  dropZone.classList.add('drag-over');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('drag-over');
});

dropZone.addEventListener('drop', async (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');

  if (isUploading) return;

  const files = Array.from(e.dataTransfer.files || []);
  if (files.length > 0) {
    await uploadFilesToDrive(files);
  }
});

fileInput.addEventListener('change', async () => {
  if (isUploading) return;

  const files = Array.from(fileInput.files || []);
  if (files.length > 0) {
    await uploadFilesToDrive(files);
  }
});

async function uploadFilesToDrive(files) {
  uploadedFiles = [];
  setUploadLocked(true);
  fileStatus.classList.remove('upload-success', 'upload-error');

  try {
    for (let i = 0; i < files.length; i++) {
      const result = await uploadFileToDrive(files[i], i + 1, files.length);
      uploadedFiles.push(result);
    }

    fileStatus.classList.add('upload-success');
    fileStatus.textContent = `✅ ${uploadedFiles.length}개 파일 업로드 완료`;

  } catch (error) {
    console.error(error);
    uploadedFiles = [];
    fileStatus.classList.add('upload-error');
    fileStatus.textContent = `❌ 파일 업로드 실패: ${error.message || '알 수 없는 오류'}`;
  } finally {
    setUploadLocked(false);
  }
}


async function uploadFileToDrive(file, fileIndex, totalFiles) {
  fileStatus.textContent = `[${fileIndex}/${totalFiles}] ${file.name} 업로드 준비 중...`;

  const sessionRes = await fetch('/api/create-upload-session', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      fileName: file.name,
      mimeType: file.type || 'application/octet-stream'
    })
  });

  const sessionData = await sessionRes.json();
  
  if (!sessionRes.ok || !sessionData.uploadUrl) {
    throw new Error(sessionData.detail || sessionData.error || '업로드 주소 생성 실패');
  }

  const uploadUrl = sessionData.uploadUrl;
  const fileId = sessionData.fileId;
  const fileLink = sessionData.fileLink;


const chunkSize = file.size;
  let start = 0;

  while (start < file.size) {
    const end = Math.min(start + chunkSize, file.size) - 1;
    const chunk = file.slice(start, end + 1);

    const percent = Math.round(((end + 1) / file.size) * 100);
    fileStatus.textContent = `[${fileIndex}/${totalFiles}] ${file.name} 업로드 중... ${percent}%`;

    const chunkRes = await fetch('/api/upload-chunk', {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/octet-stream',
        'x-upload-url': uploadUrl,
        'x-start': start.toString(),
        'x-end': end.toString(),
        'x-total': file.size.toString(),
        'x-mime-type': file.type || 'application/octet-stream'
      },
      body: chunk
    });

    const data = await chunkRes.json();

    if (!chunkRes.ok) {
      throw new Error(data.error || '파일 업로드 실패');
    }

    if (data.done) {
      return {
        name: file.name,
        size: file.size,
        link: fileLink || data.fileLink || `https://drive.google.com/file/d/${fileId || data.result?.id}/view`
      };
    }

    start = end + 1;
  }

  return {
    name: file.name,
    size: file.size,
    link: fileLink || `https://drive.google.com/file/d/${fileId}/view`
  };
}



form.addEventListener('submit', async function (e) {

  e.preventDefault();

  // 첨부파일 총 용량 제한: 4MB
  const MAX_TOTAL_SIZE = 4 * 1024 * 1024;

  const selectedFiles = Array.from(fileInput.files || []);
  const totalSize = selectedFiles.reduce((sum, file) => sum + file.size, 0);

  if (totalSize > MAX_TOTAL_SIZE) {
  alert('첨부파일은 총 4MB 이하만 업로드 가능합니다.\n또는 ty190225@gmail.com으로 직접 파일을 보내주세요.');
  return;
}

if (isUploading) {
  alert('파일 업로드가 끝난 뒤에 다시 눌러주세요.');
  return;
}


  submitBtn.disabled = true;
  submitBtn.classList.add('is-disabled');
  submitBtn.textContent = '전송 중...';

  const params = {
    inquiry_time: getKoreaTimeString(),
    name: document.querySelector('.form-name').value,
    phone: document.querySelector('.form-phone').value,
    email: document.querySelector('.form-email').value,
    category: document.querySelector('.form-category').value,
    budget: document.querySelector('.form-budget').value || '선택 안 함',
    message: document.querySelector('.form-detail').value,
    file_name: getUploadedFileNames(),
    file_link: getUploadedFileLinks()
  };

  try {
    await emailjs.send('ty190225', 'template_95xtibs', params);

    const sheetRes = await fetch('/api/save-inquiry', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(params)
    });




    if (!sheetRes.ok) {
  const err = await sheetRes.json().catch(() => ({}));
  console.error('스프레드시트 저장 실패:', err);
  alert(`메일은 전송됐지만 스프레드시트 저장에 실패했습니다.\n${err.detail || err.error || ''}`);
}
 {
      alert('견적 문의가 정상적으로 접수되었습니다.');
    }

    form.reset();
    resetUploadState();

  } catch (error) {
    console.error('문의 전송 오류:', error);
    alert('전송 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
  } finally {
    submitBtn.disabled = false;
    submitBtn.classList.remove('is-disabled');
    submitBtn.textContent = '견적 문의 보내기';
  }
});
</script>
